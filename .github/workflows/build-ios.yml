name: Build CatPlayer iOS IPA

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode (full has nodejs-mobile, minimal is bare RN)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - minimal
  push:
    branches: [main, feat/catplayer-ios]
    paths:
      - 'CatPlayer/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JS + overlay + native patches
        working-directory: CatPlayer
        env:
          BUILD_MODE: ${{ github.event.inputs.mode || 'full' }}
        run: |
          chmod +x setup.sh build-ipa.sh
          EXTRA_FLAGS=""
          if [ "$BUILD_MODE" = "minimal" ]; then EXTRA_FLAGS="--minimal"; fi
          ./setup.sh --skip-pod $EXTRA_FLAGS

      # nodejs-mobile build phase requires Node 18; switch now that npm/metro work is done
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Pod install
        working-directory: CatPlayer
        run: cd app/ios && pod install --repo-update

      - name: Build unsigned IPA
        working-directory: CatPlayer
        run: ./build-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatPlayer-${{ github.event.inputs.mode || 'full' }}-ipa
          path: CatPlayer/app/ios/build/CatPlayer.ipa
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/feat/catplayer-ios' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_MODE: ${{ github.event.inputs.mode || 'full' }}
          RUN_NUM: ${{ github.run_number }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$BUILD_MODE" = "minimal" ]; then
            BODY="## CatPlayer iOS IPA ($BUILD_MODE) (unsigned)

          **Source:** \`$REF_NAME\` @ \`$SHA\`
          **Mode:** \`$BUILD_MODE\`

          ### ⚠️ 这是 Minimal 版（无 nodejs-mobile）
          用于排查：如果能启动说明 RN 本身没问题，崩溃来自 native module。
          完整版请用其他 Release。"
          else
            BODY="## CatPlayer iOS IPA ($BUILD_MODE) (unsigned)

          **Source:** \`$REF_NAME\` @ \`$SHA\`
          **Mode:** \`$BUILD_MODE\`

          ### 安装（未签名 → 侧载自签）
          下载 \`CatPlayer.ipa\` 后用以下任一工具安装到 iPhone：
          - [Sideloadly](https://sideloadly.io/)（Win/macOS，免费 Apple ID）
          - [AltStore](https://altstore.io/)（免费 Apple ID，7 天自动续签）
          - [TrollStore](https://github.com/opa334/TrollStore)（受支持 iOS 版本，永久签名）

          > 免费 Apple ID 签名 7 天过期，到期重签即可。

          ### 功能
          - 内嵌 Node.js 运行 CatVod/CatPaw 爬虫源
          - 视频/音频播放
          - 全屏按钮自动横屏全屏
          - 后台/息屏续播声音"
          fi
          # Write to file to preserve exact formatting
          printf '%s' "$BODY" > /tmp/release_body.md
          echo "RELEASE_BODY<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release_body.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        id: release_body

      - name: Create Release
        if: steps.release_body.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-${{ github.event.inputs.mode || 'full' }}-v${{ github.run_number }}
          name: CatPlayer ${{ github.event.inputs.mode || 'Full' }} v${{ github.run_number }}
          body_path: /tmp/release_body.md
          files: CatPlayer/app/ios/build/CatPlayer.ipa
          draft: false
          prerelease: ${{ github.event.inputs.mode == 'minimal' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
