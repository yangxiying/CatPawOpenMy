name: Build CatPlayer iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - 'CatPlayer/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JS + overlay + native patches
        working-directory: CatPlayer
        run: |
          chmod +x setup.sh build-ipa.sh
          ./setup.sh --skip-pod

      # nodejs-mobile build phase requires Node 18; switch now that npm/metro work is done
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Pod install
        working-directory: CatPlayer
        run: cd app/ios && pod install --repo-update

      - name: Build unsigned IPA
        working-directory: CatPlayer
        run: ./build-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatPlayer-unsigned-ipa
          path: CatPlayer/app/ios/build/CatPlayer.ipa
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/feat/catplayer-ios' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v${{ github.run_number }}
          name: CatPlayer iOS v${{ github.run_number }}
          body: |
            ## CatPlayer iOS IPA (unsigned)

            **Source:** `feat/catplayer-ios` @ ${{ github.sha }}
            **Built:** ${{ github.event.head_commit.timestamp || 'manual trigger' }}

            ### 安装（未签名 → 侧载自签）
            下载 `CatPlayer.ipa` 后用以下任一工具安装到 iPhone：
            - [Sideloadly](https://sideloadly.io/)（Win/macOS，免费 Apple ID）
            - [AltStore](https://altstore.io/)（免费 Apple ID，7 天自动续签）
            - [TrollStore](https://github.com/opa334/TrollStore)（受支持 iOS 版本，永久签名）

            > 免费 Apple ID 签名 7 天过期，到期重签即可。

            ### 功能
            - 内嵌 Node.js 运行 CatVod/CatPaw 爬虫源
            - 视频/音频播放
            - 全屏按钮自动横屏全屏
            - 后台/息屏续播声音
          files: CatPlayer/app/ios/build/CatPlayer.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
