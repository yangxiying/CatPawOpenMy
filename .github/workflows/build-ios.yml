name: Build CatPlayer iOS IPA

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode (full has nodejs-mobile, minimal is bare RN)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - minimal
  push:
    branches: [main, feat/catplayer-ios]
    paths:
      - 'CatPlayer/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JS + overlay + native patches
        working-directory: CatPlayer
        env:
          BUILD_MODE: ${{ github.event.inputs.mode || 'full' }}
        run: |
          chmod +x setup.sh build-ipa.sh
          # Force clean node_modules to avoid corrupted cache
          rm -rf app/node_modules app/package-lock.json
          EXTRA_FLAGS=""
          if [ "$BUILD_MODE" = "minimal" ]; then EXTRA_FLAGS="--minimal"; fi
          ./setup.sh --skip-pod $EXTRA_FLAGS

      # nodejs-mobile build phase requires Node 18; switch now that npm/metro work is done
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Pod install
        working-directory: CatPlayer
        run: cd app/ios && pod install --repo-update

      - name: Build unsigned IPA
        working-directory: CatPlayer
        run: ./build-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatPlayer-${{ github.event.inputs.mode || 'full' }}-ipa
          path: CatPlayer/app/ios/build/CatPlayer.ipa
          if-no-files-found: error

      - name: Build release body
        if: github.ref == 'refs/heads/feat/catplayer-ios' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          BUILD_MODE: ${{ github.event.inputs.mode || 'full' }}
        run: |
          echo "## CatPlayer iOS IPA ($BUILD_MODE) (unsigned)" > /tmp/release_body.md
          echo "" >> /tmp/release_body.md
          if [ "$BUILD_MODE" = "minimal" ]; then
            echo "### ⚠️ 这是 Minimal 版（无 nodejs-mobile）" >> /tmp/release_body.md
            echo "用于排查：如果能启动说明 RN 本身没问题，崩溃来自 native module。" >> /tmp/release_body.md
            echo "完整版请用其他 Release。" >> /tmp/release_body.md
          else
            echo "### 安装（未签名 → 侧载自签）" >> /tmp/release_body.md
            echo "下载 CatPlayer.ipa 后用以下任一工具安装到 iPhone：" >> /tmp/release_body.md
            echo "- [Sideloadly](https://sideloadly.io/)（Win/macOS，免费 Apple ID）" >> /tmp/release_body.md
            echo "- [AltStore](https://altstore.io/)（免费 Apple ID，7 天自动续签）" >> /tmp/release_body.md
            echo "- [TrollStore](https://github.com/opa334/TrollStore)（受支持 iOS 版本，永久签名）" >> /tmp/release_body.md
            echo "" >> /tmp/release_body.md
            echo "### 功能" >> /tmp/release_body.md
            echo "- 内嵌 Node.js 运行 CatVod/CatPaw 爬虫源" >> /tmp/release_body.md
            echo "- 视频/音频播放" >> /tmp/release_body.md
            echo "- 全屏按钮自动横屏全屏" >> /tmp/release_body.md
            echo "- 后台/息屏续播声音" >> /tmp/release_body.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-${{ github.event.inputs.mode || 'full' }}-v${{ github.run_number }}
          name: CatPlayer ${{ github.event.inputs.mode || 'Full' }} v${{ github.run_number }}
          body_path: /tmp/release_body.md
          files: CatPlayer/app/ios/build/CatPlayer.ipa
          draft: false
          prerelease: ${{ github.event.inputs.mode == 'minimal' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
